<!DOCTYPE html>
<html lang="pl">

    <meta name="referrer" content="no-referrer">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f9ff;
            touch-action: manipulation;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Animacje Standardowe */
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px) rotate(-5deg); } 75% { transform: translateX(10px) rotate(5deg); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); } 50% { box-shadow: 0 0 20px 10px rgba(59, 130, 246, 0.3); } }
        .is-playing-audio { animation: pulse-glow 1s infinite; border-color: #3b82f6 !important; }

        /* Karty standardowe */
        .card { transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .card:hover, .card:active { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }

        /* Karty Memory */
        .memory-card { perspective: 1000px; aspect-ratio: 1; }
        .memory-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .memory-card.flipped .memory-card-inner { transform: rotateY(180deg); }
        .memory-card-front, .memory-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .memory-card-front { background-color: #e2e8f0; border: 4px solid #cbd5e1; font-size: 3rem; color: #94a3b8; }
        .memory-card-front::after { content: '?'; font-weight: 900; }
        .memory-card-back { background-color: white; border: 4px solid #818cf8; transform: rotateY(180deg); flex-direction: column; }
        .memory-card.matched .memory-card-back { background-color: #dcfce7; border-color: #22c55e; opacity: 0.9; }

        /* SPE: REDUCE MOTION (Wyłączenie animacji) */
        body.reduce-motion * {
            animation: none !important;
            transition: none !important;
        }
        body.reduce-motion .card:hover, body.reduce-motion .card:active { transform: none !important; }

        /* SPE: HIGH CONTRAST (Wysoki kontrast) */
        body.high-contrast { background-color: #121212 !important; color: #ffffff !important; }
        body.high-contrast header { background-color: #1e1e1e !important; border-bottom: 2px solid #333; }
        body.high-contrast .card, body.high-contrast .bg-white { 
            background-color: #1e1e1e !important; 
            border: 4px solid #fff !important; 
            color: #fff !important; 
            box-shadow: none !important; 
        }
        body.high-contrast .text-slate-400, body.high-contrast .text-slate-500, body.high-contrast .text-slate-600, body.high-contrast .text-slate-700, body.high-contrast .text-slate-800 { color: #ffffff !important; }
        body.high-contrast .text-indigo-600 { color: #818cf8 !important; }
        body.high-contrast .memory-card-front { background-color: #333 !important; border-color: #fff !important; color: #fff !important; }
        body.high-contrast .memory-card-back { background-color: #000 !important; border-color: #fff !important; }
        body.high-contrast .bg-indigo-50 { background-color: #333 !important; border-color: #fff !important; color: #fff !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        #settings-modal { backdrop-filter: blur(5px); }
    </style>

        // --- USTAWIENIA SPE (Logika) ---
        function toggleSettingsModal() {
            const modal = document.getElementById('settings-modal');
            if (modal.classList.contains('hidden')) {
                document.getElementById('setting-reduce-motion').checked = currentState.settings.reduceMotion;
                document.getElementById('setting-high-contrast').checked = currentState.settings.highContrast;
                document.getElementById('setting-hide-scores').checked = currentState.settings.hideScores;
                document.getElementById('setting-mute-sounds').checked = currentState.settings.muteSystemSounds;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function updateSettings() {
            currentState.settings = {
                reduceMotion: document.getElementById('setting-reduce-motion').checked,
                highContrast: document.getElementById('setting-high-contrast').checked,
                hideScores: document.getElementById('setting-hide-scores').checked,
                muteSystemSounds: document.getElementById('setting-mute-sounds').checked
            };
            localStorage.setItem('epa_settings', JSON.stringify(currentState.settings));
            applySettingsToUI();
        }

        function applySettingsToUI() {
            const body = document.body;
            const starsDisplay = document.getElementById('stars-display');
            
            if (currentState.settings.reduceMotion) body.classList.add('reduce-motion');
            else body.classList.remove('reduce-motion');
            
            if (currentState.settings.highContrast) body.classList.add('high-contrast');
            else body.classList.remove('high-contrast');
            
            if (currentState.settings.hideScores) starsDisplay.style.display = 'none';
            else starsDisplay.style.display = 'flex';
        }

        // --- DŹWIĘKI I GŁOS (Zabezpieczone przed GitHub/CORS) ---
        function playHighQualityVoice(text, onComplete = null) {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }

            // Zmienna zapobiegająca podwójnemu uruchomieniu głosu awaryjnego
            let isFallbackTriggered = false;
            const triggerFallback = () => {
                if (isFallbackTriggered) return;
                isFallbackTriggered = true;
                fallbackToSystemVoice(text, onComplete);
            };

            const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=en-GB&client=tw-ob&q=${encodeURIComponent(text)}`;
            currentAudio = new Audio(url);
            currentAudio.onended = () => { if (onComplete) onComplete(); };
            
            // Reagujemy tylko raz, jeśli API Google mimo wszystko wyrzuci błąd
            currentAudio.onerror = triggerFallback;
            
            const playPromise = currentAudio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    triggerFallback();
                });
            }
        }

        function fallbackToSystemVoice(text, onComplete) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-GB'; 
                utterance.rate = 0.9; 
                utterance.pitch = 1.1;
                
                let bestVoice = systemVoices.find(v => v.lang === 'en-GB' && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Hazel') || v.name.includes('Martha')));
                if (!bestVoice) bestVoice = systemVoices.find(v => v.lang.startsWith('en-GB'));
                if (!bestVoice) bestVoice = systemVoices.find(v => v.lang.startsWith('en-US'));
                if (!bestVoice) bestVoice = systemVoices[0];
                
                if (bestVoice) utterance.voice = bestVoice;
                
                utterance.onend = () => { if(onComplete) onComplete(); };
                utterance.onerror = () => { if(onComplete) onComplete(); };
                window.speechSynthesis.speak(utterance);
            } else { 
                if (onComplete) onComplete(); 
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSoundEffect(type) {
            if(currentState.settings.muteSystemSounds) return; // SPE: Wyłącza piski, pikanie i dźwięki błędu
            if(currentState.settings.reduceMotion && type === 'pop') return; // Mniej dźwięków interfejsu w trybie spokojnym
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'pop') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
            }
        }

        // --- Nawigacja i Przepływ ---
        function selectLevel(lvl) { playSoundEffect('pop'); currentState.currentLevel = lvl; currentState.view = 'home'; render(); }
        function goToLevelSelect() { playSoundEffect('pop'); currentState.view = 'levelSelect'; render(); }
        function goHome() { playSoundEffect('pop'); currentState.view = 'home'; render(); }
        function goToCategorySelect(mode) { playSoundEffect('pop'); if(audioCtx.state === 'suspended') audioCtx.resume(); currentState.mode = mode; currentState.view = 'categorySelect'; render(); }
        function selectCategory(catKey) { playSoundEffect('pop'); currentState.category = catKey; currentState.view = currentState.mode === 'learn' ? 'learn' : 'gameSelect'; render(); }
        function startGameType(type) { playSoundEffect('pop'); currentState.gameType = type; if (type === 'guess') startGuessGame(); else if (type === 'memory') startMemoryGame(); else if (type === 'sort') startSortGame(); }
        function handleWin() { if (!currentState.completedCategories.includes(currentState.category)) { currentState.completedCategories.push(currentState.category); saveProgress(); } currentState.view = 'reward'; render(); }

        // --- Logika Gier (Uproszczona wywołania) ---
        function speakAndAnimate(element, word) {
            const emojiDiv = element.querySelector('.emoji-container');
            if(!currentState.settings.reduceMotion) {
                emojiDiv.classList.remove('animate-pop'); void emojiDiv.offsetWidth; emojiDiv.classList.add('animate-pop');
                element.classList.add('is-playing-audio');
            }
            playHighQualityVoice(word, () => { element.classList.remove('is-playing-audio'); });
        }

        function startGuessGame() { currentState.score = 0; currentState.currentWordIndex = 0; let words = [...getWordsForCurrentLevel(currentState.category)]; currentState.playWords = shuffleArray(words).slice(0, 8); setupNextGuessQuestion(); currentState.view = 'playGuess'; render(); }
        function setupNextGuessQuestion() { const currentWord = currentState.playWords[currentState.currentWordIndex]; let distractors = getWordsForCurrentLevel(currentState.category).filter(w => w.en !== currentWord.en); distractors = shuffleArray(distractors).slice(0, 2); currentState.options = shuffleArray([currentWord, ...distractors]); }
        function speakCurrentGuessWord() { const word = currentState.playWords[currentState.currentWordIndex].en; const btn = document.getElementById('main-audio-btn'); if(btn && !currentState.settings.reduceMotion) btn.classList.add('is-playing-audio'); playHighQualityVoice(word, () => { if(btn) btn.classList.remove('is-playing-audio'); }); }

        let isChecking = false;
        function checkGuessAnswer(selectedIndex) {
            if (isChecking) return;
            isChecking = true;
            const selectedOption = currentState.options[selectedIndex];
            const currentWord = currentState.playWords[currentState.currentWordIndex];
            const cardEl = document.getElementById(`option-${selectedIndex}`);

            if (selectedOption.en === currentWord.en) {
                playSoundEffect('correct');
                cardEl.classList.remove('border-slate-100'); cardEl.classList.add('border-green-500', 'bg-green-50');
                if(!currentState.settings.reduceMotion) cardEl.classList.add('animate-pop');
                currentState.score += 2; currentState.totalStars += 2; saveProgress();
                setTimeout(() => { currentState.currentWordIndex++; if (currentState.currentWordIndex >= currentState.playWords.length) handleWin(); else { setupNextGuessQuestion(); render(); } isChecking = false; }, 1200);
            } else {
                playSoundEffect('wrong');
                cardEl.classList.add('opacity-50', 'border-red-300', 'bg-red-50');
                if(!currentState.settings.reduceMotion) cardEl.classList.add('animate-shake');
                setTimeout(() => { cardEl.classList.remove('animate-shake', 'opacity-50', 'border-red-300', 'bg-red-50'); isChecking = false; }, 800);
            }
        }

        function startMemoryGame() { currentState.score = 0; let gameWords = shuffleArray([...getWordsForCurrentLevel(currentState.category)]).slice(0, Math.min(6, getWordsForCurrentLevel(currentState.category).length)); let cards = []; gameWords.forEach((w, idx) => { cards.push({ id: `e${idx}`, w: w, type: 'emoji', matched: false, flipped: false }); cards.push({ id: `t${idx}`, w: w, type: 'text', matched: false, flipped: false }); }); currentState.memoryCards = shuffleArray(cards); currentState.memoryFlipped = []; currentState.memoryMatches = 0; currentState.isCheckingMemory = false; currentState.view = 'playMemory'; render(); }
        function flipMemoryCard(idx) { if (currentState.isCheckingMemory) return; let card = currentState.memoryCards[idx]; if (card.flipped || card.matched) return; card.flipped = true; currentState.memoryFlipped.push(idx); playHighQualityVoice(card.w.en); render(); if (currentState.memoryFlipped.length === 2) { currentState.isCheckingMemory = true; setTimeout(checkMemoryMatch, 1000); } }
        function checkMemoryMatch() { const idx1 = currentState.memoryFlipped[0]; const idx2 = currentState.memoryFlipped[1]; const card1 = currentState.memoryCards[idx1]; const card2 = currentState.memoryCards[idx2]; if (card1.w.en === card2.w.en) { playSoundEffect('correct'); card1.matched = true; card2.matched = true; currentState.memoryMatches++; currentState.score += 3; currentState.totalStars += 3; saveProgress(); if (currentState.memoryMatches === currentState.memoryCards.length / 2) { setTimeout(() => { handleWin(); }, 800); return; } } else { playSoundEffect('wrong'); card1.flipped = false; card2.flipped = false; } currentState.memoryFlipped = []; currentState.isCheckingMemory = false; render(); }

        function startSortGame() { currentState.score = 0; let cat1Key = currentState.category; let availableCats = Object.keys(vocabulary).filter(k => vocabulary[k].minLevel <= currentState.currentLevel && vocabulary[k].words.filter(w => w.minLevel <= currentState.currentLevel).length > 0); let possibleSortPartners = availableCats.filter(k => k !== cat1Key); let cat2Key = possibleSortPartners[Math.floor(Math.random() * possibleSortPartners.length)]; let words1 = shuffleArray([...getWordsForCurrentLevel(cat1Key)]).slice(0, 5).map(w => ({...w, cat: cat1Key})); let words2 = shuffleArray([...getWordsForCurrentLevel(cat2Key)]).slice(0, 5).map(w => ({...w, cat: cat2Key})); currentState.sortItems = shuffleArray([...words1, ...words2]); currentState.sortIndex = 0; currentState.sortCats = [cat1Key, cat2Key]; currentState.view = 'playSort'; render(); }
        function sortItemClick(selectedCatKey) { if(isChecking) return; isChecking = true; let currentItem = currentState.sortItems[currentState.sortIndex]; let itemEl = document.getElementById('sort-item'); if (selectedCatKey === currentItem.cat) { playSoundEffect('correct'); if(!currentState.settings.reduceMotion) itemEl.classList.add('scale-0', 'opacity-0'); else itemEl.style.display = 'none'; currentState.score += 2; currentState.totalStars += 2; saveProgress(); setTimeout(() => { currentState.sortIndex++; isChecking = false; if(currentState.sortIndex >= currentState.sortItems.length) handleWin(); else render(); }, 400); } else { playSoundEffect('wrong'); itemEl.classList.add('border-red-400', 'bg-red-50'); if(!currentState.settings.reduceMotion) itemEl.classList.add('animate-shake'); setTimeout(() => { itemEl.classList.remove('animate-shake', 'border-red-400', 'bg-red-50'); isChecking = false; }, 600); } }

        function shuffleArray(array) { let curId = array.length; while (0 !== curId) { let randId = Math.floor(Math.random() * curId); curId -= 1; let tmp = array[curId]; array[curId] = array[randId]; array[randId] = tmp; } return array; }
        function fireConfetti() { const canvas = document.getElementById('confetti-canvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; let particles = []; const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42b883', '#3b82f6', '#fbbf24']; for (let i = 0; i < 150; i++) { particles.push({ x: canvas.width / 2, y: canvas.height / 2, r: Math.random() * 8 + 3, dx: Math.random() * 30 - 15, dy: Math.random() * -30 - 10, color: colors[Math.floor(Math.random() * colors.length)], tilt: Math.floor(Math.random() * 10) - 10, tiltAngleInc: (Math.random() * 0.07) + 0.05, tiltAngle: 0 }); } let animationId; function renderConfetti() { ctx.clearRect(0, 0, canvas.width, canvas.height); let remaining = false; particles.forEach((p) => { p.tiltAngle += p.tiltAngleInc; p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2; p.x += Math.sin(p.tiltAngle) * 2; p.dy += 0.3; p.y += p.dy; p.x += p.dx; if (p.y <= canvas.height) remaining = true; ctx.beginPath(); ctx.lineWidth = p.r; ctx.strokeStyle = p.color; ctx.moveTo(p.x + p.tilt + p.r, p.y); ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r); ctx.stroke(); }); if (remaining) { animationId = requestAnimationFrame(renderConfetti); } else { ctx.clearRect(0, 0, canvas.width, canvas.height); } } renderConfetti(); }
        window.addEventListener('resize', () => { const canvas = document.getElementById('confetti-canvas'); if(canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } });

        // Start aplikacji z uwzględnieniem zapisanych ustawień SPE
        applySettingsToUI();
        render();
    </script>
</body>
